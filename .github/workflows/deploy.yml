name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create .env file
      run: |
        echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env
        echo "VITE_GEMINI_TASK_PROMPT=${{ secrets.VITE_GEMINI_TASK_PROMPT }}" >> .env
        echo "VITE_GEMINI_JOURNAL_PROMPT=${{ secrets.VITE_GEMINI_JOURNAL_PROMPT }}" >> .env
        echo "VITE_GEMINI_MEAL_PROMPT=${{ secrets.VITE_GEMINI_MEAL_PROMPT }}" >> .env

    - name: Build
      run: npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false
